name: Test Deployment
on: [push, pull_request, workflow_dispatch]
jobs:
  deploy:
    name: test deployment scripts
    runs-on: ubuntu-latest
    container: nvidia/cuda:12.2.2-cudnn8-runtime-ubuntu22.04

    steps:
      - name: Checkout Git Repository
        uses: actions/checkout@v3

      - name: Install Depedencies
        run: |
          apt-get update -qq
          apt-get install -y build-essential cmake curl git libibverbs-dev mpich libmpich-dev python3 zlib1g-dev

      - name: Run Deploy Script
        run: ./deploy.sh
        env:
          THREADS: 4
