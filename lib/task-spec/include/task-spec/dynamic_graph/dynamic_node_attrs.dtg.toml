namespace = "FlexFlow"
name = "DynamicNodeAttrs"
type = "struct"
features = [
  "eq",
  "hash",
  "fmt",
]

includes = [
  "<optional>",
  "task-spec/dynamic_graph/dynamic_task_type.dtg.h",
  "task-spec/dynamic_graph/dynamic_layer_guid_t.dtg.h",
  "task-spec/dynamic_graph/training_operation_attrs.dtg.h",
  "task-spec/device_specific_per_device_op_state.dtg.h",
  "task-spec/global_device_id_t.dtg.h",
  "task-spec/dynamic_graph/dynamic_node_mapping.dtg.h",
]

src_includes = [
  "utils/fmt/optional.h",
]

[[fields]]
name = "task_type"
type = "std::optional<::FlexFlow::DynamicTaskType>"

[[fields]]
name = "device_id"
type = "std::optional<::FlexFlow::global_device_id_t>"
docstring = '''
\brief The device on which this task should execute.

For a standard \ref ParallelComputationGraph, filled in by
\ref perform_shard_expansion.

\note Right now the \c device_coord for a copy node is sort of meaningless
because we have one controller issuing all copies for the entire graph, no
matter where they are. However the intention is this to be the "owner" or
"issuer" of the copy, which matters a lot more down the road once we write the
control replicated version of the Realm backend. At that point, you will have
to pick one specific node to issue the copy, and the program should be correct
no matter what you pick, but there may be performance implications to those
choices.
'''

[[fields]]
name = "mapping"
type = "std::optional<::FlexFlow::DynamicNodeMapping>"

[[fields]]
name = "op_attrs"
type = "std::optional<::FlexFlow::TrainingOperationAttrs>"

[[fields]]
name = "layer_guid"
type = "::FlexFlow::dynamic_layer_guid_t"

[[fields]]
name = "per_device_op_state"
type = "std::optional<::FlexFlow::DeviceSpecificPerDeviceOpState>"
