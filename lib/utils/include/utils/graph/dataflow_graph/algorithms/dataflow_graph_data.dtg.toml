namespace = "FlexFlow"
name = "DataflowGraphData"
type = "struct"
features = [
  "eq",
  "hash",
  "fmt",
  "json",
]

includes = [
  "utils/graph/node/node.dtg.h",
  "utils/graph/dataflow_graph/dataflow_edge.dtg.h",
  "utils/graph/dataflow_graph/dataflow_output.dtg.h",
  "<unordered_set>",
]

src_includes = [
  "utils/hash/unordered_set.h",
  "utils/fmt/unordered_set.h",
]

[[fields]]
name = "nodes"
type = "std::unordered_set<::FlexFlow::Node>"

[[fields]]
name = "edges"
type = "std::unordered_set<::FlexFlow::DataflowEdge>"

[[fields]]
name = "outputs"
type = "std::unordered_set<::FlexFlow::DataflowOutput>"
